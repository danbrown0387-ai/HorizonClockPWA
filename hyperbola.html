<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hyperbola - Touch Optimized (Larger View 2)</title>
<style>
body {
  margin: 0;
  background: black;
}
canvas {
  display: block;
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
var canvas = document.getElementById("c");
var ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

var zoom = 85;      // larger default zoom
var offsetX = 0;
var offsetY = -40;  // slightly higher for small screens

var dragging = false;
var lastX = 0;
var lastY = 0;

canvas.addEventListener("touchstart", function(e) {
  var t = e.touches[0];
  dragging = true;
  lastX = t.clientX;
  lastY = t.clientY;
});

canvas.addEventListener("touchmove", function(e) {
  if (!dragging) return;
  var t = e.touches[0];

  offsetX += (t.clientX - lastX) * 0.8;
  offsetY += (t.clientY - lastY) * 0.8;

  lastX = t.clientX;
  lastY = t.clientY;

  draw();
});

canvas.addEventListener("touchend", function() {
  dragging = false;
});

function drawAxes() {
  var W = canvas.width;
  var H = canvas.height;

  ctx.strokeStyle = "rgba(255,255,255,0.3)";
  ctx.lineWidth = 1;

  ctx.beginPath();
  ctx.moveTo(0, H/2 + offsetY);
  ctx.lineTo(W, H/2 + offsetY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(W/2 + offsetX, 0);
  ctx.lineTo(W/2 + offsetX, H);
  ctx.stroke();
}

function drawHyperbola() {
  var W = canvas.width;
  var H = canvas.height;
  var cx = W/2 + offsetX;
  var cy = H/2 + offsetY;

  ctx.strokeStyle = "#00ffcc";
  ctx.lineWidth = 2;

  ctx.beginPath();
  var started = false;
  for (var x = 0.1; x < 5; x += 0.02) {
    var y = 1 / x;
    var px = cx + x * zoom;
    var py = cy - y * zoom;

    if (!started) {
      ctx.moveTo(px, py);
      started = true;
    } else {
      ctx.lineTo(px, py);
    }
  }
  ctx.stroke();

  ctx.beginPath();
  started = false;
  for (var x2 = -0.1; x2 > -5; x2 -= 0.02) {
    var y2 = 1 / x2;
    var px2 = cx + x2 * zoom;
    var py2 = cy - y2 * zoom;

    if (!started) {
      ctx.moveTo(px2, py2);
      started = true;
    } else {
      ctx.lineTo(px2, py2);
    }
  }
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawAxes();
  drawHyperbola();
}

draw();
</script>
</body>
  </html>
