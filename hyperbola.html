<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mirrored Hyperbolic Curve</title>
<style>
body{
  margin:0;
  background:black;
}
canvas{
  display:block;
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const W = canvas.width;
const H = canvas.height;

const scale = 60; // zoom level

function drawAxes(){
  ctx.strokeStyle="white";
  ctx.lineWidth=1;

  // x axis
  ctx.beginPath();
  ctx.moveTo(0,H/2);
  ctx.lineTo(W,H/2);
  ctx.stroke();

  // y axis
  ctx.beginPath();
  ctx.moveTo(W/2,0);
  ctx.lineTo(W/2,H);
  ctx.stroke();
}

function drawCurve(){

  ctx.strokeStyle="cyan";
  ctx.lineWidth=2;
  ctx.beginPath();

  for(let y=-10; y<=10; y+=0.01){

    let x = Math.exp(-Math.abs(y));

    let px = W/2 + x*scale;
    let py = H/2 - y*scale;

    if(y===-10) ctx.moveTo(px,py);
    else ctx.lineTo(px,py);
  }

  ctx.stroke();

  // mirror to left side
  ctx.beginPath();

  for(let y=-10; y<=10; y+=0.01){

    let x = -Math.exp(-Math.abs(y));

    let px = W/2 + x*scale;
    let py = H/2 - y*scale;

    if(y===-10) ctx.moveTo(px,py);
    else ctx.lineTo(px,py);
  }

  ctx.stroke();
}

function draw(){

  ctx.fillStyle="black";
  ctx.fillRect(0,0,W,H);

  drawAxes();
  drawCurve();
}

draw();
</script>

</body>
</html>
